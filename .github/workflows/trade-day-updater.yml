name: Trade Day Updater

on:
  schedule:
    # 17:00 Asia/Shanghai = 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-updater:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trade day updater
        run: |
          mkdir -p logs
          python -c "from data_updater.trade_day_updater import run_daily_update; run_daily_update()" 2>&1 | tee -a logs/trade_day_updater.log

      - name: Upload updater log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-day-updater-log
          path: logs/trade_day_updater.log
          if-no-files-found: ignore
