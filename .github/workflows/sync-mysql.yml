name: Sync MySQL Data

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "sync mode"
        required: false
        default: "scheduled"
        type: choice
        options:
          - scheduled
          - bootstrap
      only:
        description: "target dataset"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - market
          - daily_basic
      trade_date:
        description: "trade date like 20260402"
        required: false
        default: ""
        type: string
      lookback_days:
        description: "daily_basic lookback trade days"
        required: false
        default: "3"
        type: string

jobs:
  sync-mysql:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3307
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
      MYSQL_USER: ${{ secrets.MYSQL_USER }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      SYNC_SSH_HOST: ${{ secrets.SYNC_SSH_HOST }}
      SYNC_SSH_PORT: ${{ secrets.SYNC_SSH_PORT }}
      SYNC_SSH_USER: ${{ secrets.SYNC_SSH_USER }}
      SYNC_SSH_PASSWORD: ${{ secrets.SYNC_SSH_PASSWORD }}
      SYNC_MODE: ${{ github.event.inputs.mode || 'scheduled' }}
      SYNC_ONLY: ${{ github.event.inputs.only || 'all' }}
      SYNC_TRADE_DATE: ${{ github.event.inputs.trade_date || '' }}
      SYNC_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '3' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass netcat-openbsd

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Open SSH tunnel to MySQL
        run: |
          sshpass -p "$SYNC_SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ExitOnForwardFailure=yes \
            -f -N \
            -L 3307:127.0.0.1:3306 \
            -p "${SYNC_SSH_PORT:-22}" \
            "$SYNC_SSH_USER@$SYNC_SSH_HOST"

      - name: Verify tunnel
        run: nc -z 127.0.0.1 3307

      - name: Sync MySQL
        run: |
          CMD=(python scripts/sync_mysql.py --mode "$SYNC_MODE" --only "$SYNC_ONLY" --lookback-days "$SYNC_LOOKBACK_DAYS")
          if [ -n "$SYNC_TRADE_DATE" ]; then
            CMD+=(--trade-date "$SYNC_TRADE_DATE")
          fi
          "${CMD[@]}"
